name: unstructured-api-staging-build

# Builds the SchoolAI fork image and publishes to GCP Artifact Registry.
# Pattern matches web-app service workflows (e.g. lms-mcp-server-staging-deploy,
# sentinel-staging-deploy): push to main triggers sai-docker-build on SchoolAI runners.
#
# Deploy is handled by web-app (webapp-deploy-argocd deploy_unstructured_api), which
# references us-central1-docker.pkg.dev/schoolai-global/docker/unstructured-api:latest-amd64
# in ops/unstructured-api/values-global.yaml. A new image is picked up on the next deploy.
#
# Upstream Unstructured-IO workflows were removed from this fork.
# Only this build workflow runs in SchoolAI CI.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_unstructured_api:
    uses: SchoolAI/github-actions-workflows/.github/workflows/sai-docker-build.yaml@main
    with:
      build_amd_enabled: true
      build_arm_enabled: false
      docker_build_amd_runs_on: sai-7cpu-26gb-amd-perf
      docker_repo: us-central1-docker.pkg.dev/schoolai-global/docker
      docker_image_name: unstructured-api
      dockerfile: ./Dockerfile
      docker_build_args: |
        PIPELINE_PACKAGE=general
      push_image: true
      push_cache: true
    secrets:
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_STAGING }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_STAGING_DEPLOYMENTS }}
